<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Caso indústria — metalurgia e otimização tributária">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1A2E"/>
      <stop offset="55%" stop-color="#102A4A"/>
      <stop offset="100%" stop-color="#1A3A6B"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A93B5"/>
      <stop offset="100%" stop-color="#3A5174"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A5174"/>
      <stop offset="100%" stop-color="#1A2D4D"/>
    </linearGradient>
    <linearGradient id="growthArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FE08A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3FE08A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3FE08A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3FE08A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB347" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
    <pattern id="bp" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#13294D" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#bp)" opacity="0.55"/>

  <!-- Factory skyline silhouette (back) -->
  <g fill="#0A1A30" opacity="0.85">
    <!-- Main building -->
    <rect x="180" y="320" width="320" height="180"/>
    <polygon points="180,320 340,260 500,320"/>
    <!-- Side hangar -->
    <rect x="500" y="360" width="180" height="140"/>
    <polygon points="500,360 590,320 680,360"/>
    <!-- Right wing -->
    <rect x="100" y="380" width="80" height="120"/>
    <!-- Right side factory -->
    <rect x="1080" y="340" width="240" height="160"/>
    <polygon points="1080,340 1200,290 1320,340"/>
    <rect x="1320" y="380" width="140" height="120"/>
    <!-- Chimneys -->
    <rect x="240" y="200" width="22" height="120"/>
    <rect x="280" y="180" width="22" height="140"/>
    <rect x="1170" y="220" width="22" height="120"/>
    <rect x="1210" y="200" width="22" height="140"/>
  </g>

  <!-- Chimney smoke (subtle) -->
  <g fill="#3FE08A" opacity="0.18">
    <ellipse cx="251" cy="180" rx="22" ry="14"/>
    <ellipse cx="240" cy="155" rx="28" ry="16"/>
    <ellipse cx="1181" cy="200" rx="22" ry="14"/>
    <ellipse cx="1192" cy="175" rx="28" ry="16"/>
  </g>

  <!-- Building window grid -->
  <g fill="#3FE08A" opacity="0.45">
    <rect x="220" y="350" width="6" height="6"/>
    <rect x="240" y="350" width="6" height="6"/>
    <rect x="260" y="350" width="6" height="6"/>
    <rect x="280" y="350" width="6" height="6"/>
    <rect x="300" y="350" width="6" height="6"/>
    <rect x="220" y="370" width="6" height="6"/>
    <rect x="240" y="370" width="6" height="6"/>
    <rect x="260" y="370" width="6" height="6"/>
    <rect x="280" y="370" width="6" height="6"/>
    <rect x="220" y="390" width="6" height="6"/>
    <rect x="260" y="390" width="6" height="6"/>
    <rect x="300" y="390" width="6" height="6"/>
    <rect x="1120" y="370" width="6" height="6"/>
    <rect x="1140" y="370" width="6" height="6"/>
    <rect x="1160" y="370" width="6" height="6"/>
    <rect x="1180" y="370" width="6" height="6"/>
    <rect x="1200" y="370" width="6" height="6"/>
    <rect x="1220" y="370" width="6" height="6"/>
    <rect x="1120" y="390" width="6" height="6"/>
    <rect x="1160" y="390" width="6" height="6"/>
    <rect x="1200" y="390" width="6" height="6"/>
    <rect x="1240" y="390" width="6" height="6"/>
  </g>

  <!-- Floor line -->
  <line x1="0" y1="500" x2="1600" y2="500" stroke="#3FE08A" stroke-width="1" opacity="0.18"/>

  <!-- Halo behind central gears -->
  <circle cx="800" cy="280" r="280" fill="url(#glow)"/>

  <!-- Central gear cluster -->
  <g transform="translate(800,280)">
    <!-- Big gear -->
    <g>
      <g fill="url(#metal)" stroke="#5BA8E8" stroke-width="1.5">
        <!-- Teeth (12 around) -->
        <g>
          <rect x="-12" y="-150" width="24" height="30" rx="3"/>
          <g transform="rotate(30)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(60)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(90)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(120)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(150)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(180)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(210)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(240)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(270)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(300)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
          <g transform="rotate(330)"><rect x="-12" y="-150" width="24" height="30" rx="3"/></g>
        </g>
        <circle cx="0" cy="0" r="125"/>
      </g>
      <circle cx="0" cy="0" r="125" fill="none" stroke="#3FE08A" stroke-width="2" opacity="0.85"/>
      <circle cx="0" cy="0" r="78" fill="url(#metalDark)" stroke="#5BA8E8" stroke-width="1.2"/>
      <!-- Inner cross -->
      <g stroke="#5BA8E8" stroke-width="6" stroke-linecap="round" opacity="0.85">
        <line x1="-66" y1="0"  x2="66"  y2="0"/>
        <line x1="0"   y1="-66" x2="0"  y2="66"/>
        <line x1="-46" y1="-46" x2="46" y2="46"/>
        <line x1="-46" y1="46"  x2="46" y2="-46"/>
      </g>
      <circle cx="0" cy="0" r="22" fill="#3FE08A"/>
      <circle cx="0" cy="0" r="10" fill="#0B1A2E"/>
    </g>
  </g>

  <!-- Smaller gear (right) -->
  <g transform="translate(1010,180)">
    <g fill="url(#metalDark)" stroke="#5BA8E8" stroke-width="1.2">
      <g>
        <rect x="-7" y="-78" width="14" height="18" rx="2"/>
        <g transform="rotate(45)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(90)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(135)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(180)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(225)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(270)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(315)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
      </g>
      <circle cx="0" cy="0" r="62"/>
    </g>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#3FE08A" stroke-width="1.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="34" fill="#0F2547" stroke="#5BA8E8" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#3FE08A"/>
  </g>

  <!-- Smaller gear (left) -->
  <g transform="translate(590,180)">
    <g fill="url(#metalDark)" stroke="#5BA8E8" stroke-width="1.2">
      <g>
        <rect x="-7" y="-78" width="14" height="18" rx="2"/>
        <g transform="rotate(45)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(90)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(135)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(180)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(225)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(270)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
        <g transform="rotate(315)"><rect x="-7" y="-78" width="14" height="18" rx="2"/></g>
      </g>
      <circle cx="0" cy="0" r="62"/>
    </g>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#3FE08A" stroke-width="1.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="34" fill="#0F2547" stroke="#5BA8E8" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#3FE08A"/>
  </g>

  <!-- Industrial sparks -->
  <g>
    <circle cx="600" cy="240" r="10" fill="url(#glowSpark)"/>
    <circle cx="600" cy="240" r="2.5" fill="#FFD789"/>
    <circle cx="1000" cy="240" r="10" fill="url(#glowSpark)"/>
    <circle cx="1000" cy="240" r="2.5" fill="#FFD789"/>
  </g>

  <!-- Diagonal pipes/conduits across mid -->
  <g stroke="#3A5174" stroke-width="6" fill="none" opacity="0.7" stroke-linecap="round">
    <line x1="60"   y1="120" x2="200"  y2="120"/>
    <line x1="200"  y1="120" x2="240"  y2="80"/>
    <line x1="1400" y1="100" x2="1540" y2="100"/>
    <line x1="1360" y1="140" x2="1400" y2="100"/>
  </g>
  <g fill="#5BA8E8">
    <circle cx="60"   cy="120" r="5"/>
    <circle cx="240"  cy="80"  r="5"/>
    <circle cx="1540" cy="100" r="5"/>
    <circle cx="1360" cy="140" r="5"/>
  </g>

  <!-- KPI badge: tax efficiency -->
  <g transform="translate(110,440)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="#0F2547" stroke="#3FE08A" stroke-width="1.4"/>
    <polyline points="20,28 32,18 44,24 56,12 70,18" fill="none" stroke="#3FE08A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="20" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">CARGA TRIBUTÁRIA</text>
    <text x="92" y="34" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#3FE08A">REDUÇÃO 23% / ANO</text>
  </g>

  <!-- KPI badge: operational efficiency -->
  <g transform="translate(1270,440)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="#0F2547" stroke="#5BA8E8" stroke-width="1.4"/>
    <g transform="translate(20,12)">
      <circle cx="8" cy="8" r="8" fill="none" stroke="#5BA8E8" stroke-width="1.6"/>
      <path d="M 4 8 L 7 11 L 13 5" fill="none" stroke="#5BA8E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="48" y="20" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">REGIME OTIMIZADO</text>
    <text x="48" y="34" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#5BA8E8">100% LEGAL</text>
  </g>

  <!-- Decorative glints -->
  <circle cx="60" cy="60" r="3" fill="#3FE08A"/>
  <circle cx="100" cy="40" r="2" fill="#3FE08A" opacity="0.6"/>
  <circle cx="1540" cy="60" r="3" fill="#5BA8E8" opacity="0.7"/>
  <circle cx="1490" cy="40" r="2" fill="#3FE08A" opacity="0.5"/>
</svg>
