<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Caso de tecnologia e software">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="60%" stop-color="#0F2240"/>
      <stop offset="100%" stop-color="#16335B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A66"/>
      <stop offset="100%" stop-color="#0E2547"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3FE08A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3FE08A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FD8FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4FD8FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#13294D" stroke-width="0.6"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="1" fill="#3A5A8C" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#grid)" opacity="0.6"/>
  <rect width="1600" height="600" fill="url(#dots)"/>

  <!-- Network mesh: connection lines (drawn first, behind nodes) -->
  <g stroke="#3FE08A" stroke-width="1" opacity="0.35" fill="none">
    <line x1="220" y1="180" x2="450" y2="240"/>
    <line x1="450" y1="240" x2="680" y2="160"/>
    <line x1="680" y1="160" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="1130" y2="170"/>
    <line x1="1130" y1="170" x2="1340" y2="260"/>
    <line x1="220" y1="180" x2="380" y2="380"/>
    <line x1="380" y1="380" x2="600" y2="430"/>
    <line x1="600" y1="430" x2="820" y2="380"/>
    <line x1="820" y1="380" x2="1040" y2="440"/>
    <line x1="1040" y1="440" x2="1260" y2="390"/>
    <line x1="1260" y1="390" x2="1380" y2="280"/>
    <line x1="450" y1="240" x2="600" y2="430"/>
    <line x1="680" y1="160" x2="820" y2="380"/>
    <line x1="900" y1="220" x2="1040" y2="440"/>
    <line x1="1130" y1="170" x2="1260" y2="390"/>
  </g>

  <!-- Cyan secondary mesh -->
  <g stroke="#4FD8FF" stroke-width="0.8" opacity="0.22" fill="none">
    <line x1="380" y1="380" x2="450" y2="240"/>
    <line x1="600" y1="430" x2="680" y2="160"/>
    <line x1="820" y1="380" x2="900" y2="220"/>
    <line x1="1040" y1="440" x2="1130" y2="170"/>
  </g>

  <!-- Glowing nodes (network points) -->
  <g>
    <circle cx="220" cy="180" r="32" fill="url(#nodeGlow)"/>
    <circle cx="220" cy="180" r="5" fill="#3FE08A"/>

    <circle cx="450" cy="240" r="32" fill="url(#nodeGlowCyan)"/>
    <circle cx="450" cy="240" r="5" fill="#4FD8FF"/>

    <circle cx="680" cy="160" r="40" fill="url(#nodeGlow)"/>
    <circle cx="680" cy="160" r="6" fill="#3FE08A"/>

    <circle cx="900" cy="220" r="32" fill="url(#nodeGlowCyan)"/>
    <circle cx="900" cy="220" r="5" fill="#4FD8FF"/>

    <circle cx="1130" cy="170" r="36" fill="url(#nodeGlow)"/>
    <circle cx="1130" cy="170" r="6" fill="#3FE08A"/>

    <circle cx="1340" cy="260" r="28" fill="url(#nodeGlowCyan)"/>
    <circle cx="1340" cy="260" r="4" fill="#4FD8FF"/>

    <circle cx="380" cy="380" r="28" fill="url(#nodeGlowCyan)"/>
    <circle cx="380" cy="380" r="4" fill="#4FD8FF"/>

    <circle cx="600" cy="430" r="36" fill="url(#nodeGlow)"/>
    <circle cx="600" cy="430" r="6" fill="#3FE08A"/>

    <circle cx="820" cy="380" r="32" fill="url(#nodeGlowCyan)"/>
    <circle cx="820" cy="380" r="5" fill="#4FD8FF"/>

    <circle cx="1040" cy="440" r="32" fill="url(#nodeGlow)"/>
    <circle cx="1040" cy="440" r="5" fill="#3FE08A"/>

    <circle cx="1260" cy="390" r="28" fill="url(#nodeGlowCyan)"/>
    <circle cx="1260" cy="390" r="4" fill="#4FD8FF"/>
  </g>

  <!-- Central server/data stack illustration -->
  <g transform="translate(800,300)">
    <!-- Outer halo -->
    <circle cx="0" cy="0" r="180" fill="url(#nodeGlow)" opacity="0.6"/>

    <!-- Server rack: three stacked panels -->
    <g transform="translate(-90,-90)">
      <!-- Panel 1 -->
      <rect x="0" y="0" width="180" height="50" rx="6" fill="url(#card)" stroke="#3FE08A" stroke-width="1.5" opacity="0.95"/>
      <circle cx="20" cy="25" r="4" fill="#3FE08A"/>
      <rect x="36" y="20" width="80" height="3" fill="#4FD8FF" opacity="0.7"/>
      <rect x="36" y="28" width="50" height="3" fill="#4FD8FF" opacity="0.4"/>
      <rect x="148" y="18" width="20" height="14" rx="2" fill="none" stroke="#3FE08A" stroke-width="1.2"/>

      <!-- Panel 2 -->
      <rect x="0" y="62" width="180" height="50" rx="6" fill="url(#card)" stroke="#4FD8FF" stroke-width="1.5" opacity="0.95"/>
      <circle cx="20" cy="87" r="4" fill="#4FD8FF"/>
      <rect x="36" y="82" width="100" height="3" fill="#3FE08A" opacity="0.7"/>
      <rect x="36" y="90" width="60" height="3" fill="#3FE08A" opacity="0.4"/>
      <rect x="148" y="80" width="20" height="14" rx="2" fill="none" stroke="#4FD8FF" stroke-width="1.2"/>

      <!-- Panel 3 -->
      <rect x="0" y="124" width="180" height="50" rx="6" fill="url(#card)" stroke="#3FE08A" stroke-width="1.5" opacity="0.95"/>
      <circle cx="20" cy="149" r="4" fill="#3FE08A"/>
      <rect x="36" y="144" width="70" height="3" fill="#4FD8FF" opacity="0.7"/>
      <rect x="36" y="152" width="90" height="3" fill="#4FD8FF" opacity="0.4"/>
      <rect x="148" y="142" width="20" height="14" rx="2" fill="none" stroke="#3FE08A" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Code symbols floating -->
  <g font-family="ui-monospace, 'Courier New', monospace" font-weight="700" fill="#3FE08A" opacity="0.55">
    <text x="120" y="100" font-size="22">&lt;/&gt;</text>
    <text x="1450" y="540" font-size="22">&lt;/&gt;</text>
    <text x="80" y="520" font-size="14" opacity="0.4">01001010</text>
    <text x="1380" y="120" font-size="14" opacity="0.4">11010011</text>
  </g>

  <!-- Soft horizon line at the floor -->
  <line x1="0" y1="500" x2="1600" y2="500" stroke="#3FE08A" stroke-width="1" opacity="0.18"/>

  <!-- Decorative corner glints -->
  <circle cx="60" cy="60" r="3" fill="#4FD8FF"/>
  <circle cx="100" cy="40" r="2" fill="#3FE08A" opacity="0.6"/>
  <circle cx="1540" cy="80" r="3" fill="#3FE08A" opacity="0.7"/>
  <circle cx="1490" cy="50" r="2" fill="#4FD8FF" opacity="0.5"/>
</svg>
